# ============================================================================
# Azure DevOps Pipeline - Complete Deployment
# This pipeline deploys both infrastructure and applications in sequence
# ============================================================================

trigger: none

pr: none

variables:
  - group: security-secrets
  - name: terraformVersion
    value: '1.6.0'
  - name: helmVersion
    value: '3.13.0'
  - name: azureServiceConnection
    value: 'azure-service-connection'
  - name: dockerRegistryServiceConnection
    value: 'acr-service-connection'
  - name: imageTag
    value: '$(Build.BuildId)'
  - name: backendResourceGroupName
    value: 'rg-terraform-state'
  - name: backendStorageAccountName
    value: 'tfstaterajesh15282'
  - name: backendContainerName
    value: 'tfstate'
  - name: backendKey
    value: 'aks-infrastructure.tfstate'

stages:
  # =========================================================================
  # STAGE 1: Deploy Infrastructure
  # =========================================================================
  - stage: Infrastructure
    displayName: 'Deploy Infrastructure'
    jobs:
      - job: TerraformDeploy
        displayName: 'Deploy with Terraform'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: $(terraformVersion)

          - task: AzureCLI@2
            displayName: 'Setup Terraform Backend'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az group create \
                  --name $(backendResourceGroupName) \
                  --location eastus

                az storage account create \
                  --name $(backendStorageAccountName) \
                  --resource-group $(backendResourceGroupName) \
                  --location eastus \
                  --sku Standard_LRS 2>/dev/null || true

                ACCOUNT_KEY=$(az storage account keys list \
                  --resource-group $(backendResourceGroupName) \
                  --account-name $(backendStorageAccountName) \
                  --query '[0].value' -o tsv)

                az storage container create \
                  --name $(backendContainerName) \
                  --account-name $(backendStorageAccountName) \
                  --account-key $ACCOUNT_KEY 2>/dev/null || true

          - task: AzureCLI@2
            displayName: 'Terraform Init & Apply'
            name: terraformOutput
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
              addSpnToEnvironment: true
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                export ARM_TENANT_ID=$tenantId

                terraform init -reconfigure \
                  -backend-config="resource_group_name=$(backendResourceGroupName)" \
                  -backend-config="storage_account_name=$(backendStorageAccountName)" \
                  -backend-config="container_name=$(backendContainerName)" \
                  -backend-config="key=$(backendKey)"

                terraform plan -var-file="dev.tfvars" -out=tfplan
                terraform apply -auto-approve tfplan

                RESOURCE_GROUP=$(terraform output -raw resource_group_name)
                AKS_CLUSTER=$(terraform output -raw aks_cluster_name)
                ACR_NAME=$(terraform output -raw acr_name)
                ACR_LOGIN_SERVER=$(terraform output -raw acr_login_server)

                echo "##vso[task.setvariable variable=resourceGroupName;isOutput=true]$RESOURCE_GROUP"
                echo "##vso[task.setvariable variable=aksClusterName;isOutput=true]$AKS_CLUSTER"
                echo "##vso[task.setvariable variable=acrName;isOutput=true]$ACR_NAME"
                echo "##vso[task.setvariable variable=acrLoginServer;isOutput=true]$ACR_LOGIN_SERVER"

          - task: AzureCLI@2
            displayName: 'Attach ACR to AKS'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
              inlineScript: |
                AKS_CLUSTER=$(terraform output -raw aks_cluster_name)
                RESOURCE_GROUP=$(terraform output -raw resource_group_name)
                ACR_NAME=$(terraform output -raw acr_name)

                az aks update \
                  --name $AKS_CLUSTER \
                  --resource-group $RESOURCE_GROUP \
                  --attach-acr $ACR_NAME

          - task: AzureCLI@2
            displayName: 'Allow HTTP Traffic (NSG + LB Probe)'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
              inlineScript: |
                RESOURCE_GROUP=$(terraform output -raw resource_group_name)
                AKS_CLUSTER=$(terraform output -raw aks_cluster_name)
                MC_RG="MC_${RESOURCE_GROUP}_${AKS_CLUSTER}_eastus"

                NODE_NSG=$(az network nsg list \
                  --resource-group $MC_RG \
                  --query '[0].name' -o tsv)

                az network nsg rule create \
                  --resource-group $MC_RG \
                  --nsg-name $NODE_NSG \
                  --name allow-http \
                  --priority 200 \
                  --protocol Tcp \
                  --destination-port-ranges 80 \
                  --access Allow \
                  --direction Inbound 2>/dev/null || true

                LB_PROBE=$(az network lb probe list \
                  --resource-group $MC_RG \
                  --lb-name kubernetes \
                  --query "[?contains(name,'TCP-80')].name" -o tsv 2>/dev/null || echo "")

                if [ -n "$LB_PROBE" ]; then
                  az network lb probe update \
                    --resource-group $MC_RG \
                    --lb-name kubernetes \
                    --name $LB_PROBE \
                    --protocol Tcp \
                    --path "" 2>/dev/null || true
                fi

  # =========================================================================
  # STAGE 2: Build Docker Images
  # =========================================================================
  - stage: BuildImages
    displayName: 'Build Docker Images'
    dependsOn: Infrastructure
    variables:
      acrLoginServer: $[ stageDependencies.Infrastructure.TerraformDeploy.outputs['terraformOutput.acrLoginServer'] ]
    jobs:
      - job: BuildAll
        displayName: 'Build All Images'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: Docker@2
            displayName: 'Build & Push Calculator'
            inputs:
              command: 'buildAndPush'
              repository: 'calculator'
              dockerfile: 'calculator/Dockerfile'
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: 'Build & Push Weather'
            inputs:
              command: 'buildAndPush'
              repository: 'weather'
              dockerfile: 'weather/Dockerfile'
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: 'Build & Push Traffic'
            inputs:
              command: 'buildAndPush'
              repository: 'traffic'
              dockerfile: 'traffic/Dockerfile'
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(imageTag)
                latest

  # =========================================================================
  # STAGE 3: Deploy Applications
  # =========================================================================
  - stage: DeployApps
    displayName: 'Deploy Applications'
    dependsOn:
      - Infrastructure
      - BuildImages
    variables:
      resourceGroupName: $[ stageDependencies.Infrastructure.TerraformDeploy.outputs['terraformOutput.resourceGroupName'] ]
      aksClusterName: $[ stageDependencies.Infrastructure.TerraformDeploy.outputs['terraformOutput.aksClusterName'] ]
      acrLoginServer: $[ stageDependencies.Infrastructure.TerraformDeploy.outputs['terraformOutput.acrLoginServer'] ]
    jobs:
      - deployment: Deploy
        displayName: 'Deploy to AKS'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'AKS-Production'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: HelmInstaller@1
                  inputs:
                    helmVersionToInstall: $(helmVersion)

                - task: AzureCLI@2
                  displayName: 'Get AKS Credentials'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group $(resourceGroupName) \
                        --name $(aksClusterName) \
                        --overwrite-existing \
                        --admin

                      kubectl cluster-info || { echo "Cluster unreachable"; exit 1; }

                - task: AzureCLI@2
                  displayName: 'Install NGINX Ingress Controller'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
                      helm repo update

                      helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
                        --namespace ingress-nginx \
                        --create-namespace \
                        --wait \
                        --timeout 5m 2>/dev/null || true

                - task: AzureCLI@2
                  displayName: 'Deploy Applications with Helm'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      helm upgrade --install calculator ./helm-charts/calculator-chart \
                        --set image.repository=$(acrLoginServer)/calculator \
                        --set image.tag=$(imageTag) \
                        --wait --atomic --cleanup-on-fail --timeout 10m

                      helm upgrade --install weather ./helm-charts/weather-chart \
                        --set image.repository=$(acrLoginServer)/weather \
                        --set image.tag=$(imageTag) \
                        --wait --atomic --cleanup-on-fail --timeout 10m

                      helm upgrade --install traffic ./helm-charts/traffic-chart \
                        --set image.repository=$(acrLoginServer)/traffic \
                        --set image.tag=$(imageTag) \
                        --wait --atomic --cleanup-on-fail --timeout 10m

                - task: AzureCLI@2
                  displayName: 'Apply Ingress'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      kubectl apply -f ingress.yaml
                      echo "Waiting for ingress IP..."
                      sleep 60
                      kubectl get ingress

                - task: AzureCLI@2
                  displayName: 'Verify Deployment'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "=========================================="
                      echo "DEPLOYMENT COMPLETE"
                      echo "=========================================="
                      kubectl get pods
                      kubectl get services
                      kubectl get ingress

                      INGRESS_IP=$(kubectl get ingress calculator-ingress \
                        -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "Pending")

                      echo ""
                      echo "Service URLs:"
                      echo "Calculator: http://$INGRESS_IP/calculator/add"
                      echo "Weather:    http://$INGRESS_IP/weather/london"
                      echo "Traffic:    http://$INGRESS_IP/traffic"
                      echo "=========================================="
