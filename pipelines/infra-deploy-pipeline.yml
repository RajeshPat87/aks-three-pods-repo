# ============================================================================
# Azure DevOps Pipeline - Infrastructure Deployment
# This pipeline creates the AKS infrastructure using Terraform
# ============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**
      - pipelines/infra-deploy-pipeline.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**

variables:
  - name: terraformVersion
    value: '1.6.0'
  - name: azureServiceConnection
    value: 'azure-service-connection'
  - name: backendResourceGroupName
    value: 'rg-terraform-state'
  - name: backendStorageAccountName
    value: 'tfstaterajesh15282'
  - name: backendContainerName
    value: 'tfstate'
  - name: backendKey
    value: 'aks-infrastructure.tfstate'

stages:
  # =========================================================================
  # STAGE 0: Secret Scan with GitLeaks
  # =========================================================================
  - stage: SecretScan
    displayName: 'Secret Scan (GitLeaks)'
    jobs:
      - job: GitLeaks
        displayName: 'GitLeaks Secret Scan'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            fetchDepth: 0

          - script: |
              curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz \
                | tar -xz -C /usr/local/bin gitleaks
              gitleaks detect --source . --report-format sarif --report-path gitleaks-report.sarif --exit-code 1
            displayName: 'Run GitLeaks'

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: 'gitleaks-report.sarif'
              artifactName: 'gitleaks-report'

  # =========================================================================
  # STAGE 0b: Terraform Security Scan with TFSec
  # =========================================================================
  - stage: TFSecScan
    displayName: 'Terraform Scan (TFSec)'
    dependsOn: SecretScan
    jobs:
      - job: TFSec
        displayName: 'TFSec Scan'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - script: |
              curl -sSL https://github.com/aquasecurity/tfsec/releases/download/v1.28.4/tfsec-linux-amd64 \
                -o /usr/local/bin/tfsec
              chmod +x /usr/local/bin/tfsec
              tfsec ./terraform \
                --minimum-severity HIGH \
                --format sarif \
                --out tfsec-report.sarif \
                --soft-fail
              tfsec ./terraform --minimum-severity HIGH --no-color
            displayName: 'Run TFSec'

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: 'tfsec-report.sarif'
              artifactName: 'tfsec-report'

  # =========================================================================
  # STAGE 1: Terraform Validate and Plan
  # =========================================================================
  - stage: TerraformPlan
    displayName: 'Terraform Plan'
    dependsOn: TFSecScan
    jobs:
      - job: Plan
        displayName: 'Terraform Plan'
        pool:
          vmImage: 'ubuntu-latest'

        steps:
          - checkout: self
            displayName: 'Checkout Code'

          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: $(terraformVersion)

          - task: AzureCLI@2
            displayName: 'Create Terraform Backend Storage'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az group create \
                  --name $(backendResourceGroupName) \
                  --location eastus

                az storage account create \
                  --name $(backendStorageAccountName) \
                  --resource-group $(backendResourceGroupName) \
                  --location eastus \
                  --sku Standard_LRS \
                  --encryption-services blob 2>/dev/null || true

                ACCOUNT_KEY=$(az storage account keys list \
                  --resource-group $(backendResourceGroupName) \
                  --account-name $(backendStorageAccountName) \
                  --query '[0].value' -o tsv)

                az storage container create \
                  --name $(backendContainerName) \
                  --account-name $(backendStorageAccountName) \
                  --account-key $ACCOUNT_KEY 2>/dev/null || true

                echo "Terraform backend storage ready"

          - task: AzureCLI@2
            displayName: 'Terraform Init'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
              addSpnToEnvironment: true
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                export ARM_TENANT_ID=$tenantId

                terraform init -reconfigure \
                  -backend-config="resource_group_name=$(backendResourceGroupName)" \
                  -backend-config="storage_account_name=$(backendStorageAccountName)" \
                  -backend-config="container_name=$(backendContainerName)" \
                  -backend-config="key=$(backendKey)"

          - task: AzureCLI@2
            displayName: 'Terraform Validate'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
              inlineScript: |
                terraform validate

          - task: AzureCLI@2
            displayName: 'Terraform Plan'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
              addSpnToEnvironment: true
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                export ARM_TENANT_ID=$tenantId

                terraform plan \
                  -var-file="dev.tfvars" \
                  -out=tfplan \
                  -input=false

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Terraform Plan'
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/terraform'
              artifact: 'terraform-plan'
              publishLocation: 'pipeline'

  # =========================================================================
  # STAGE 2: Terraform Apply (Manual Approval Required)
  # =========================================================================
  - stage: TerraformApply
    displayName: 'Terraform Apply'
    dependsOn: TerraformPlan
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: Apply
        displayName: 'Terraform Apply'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'AKS-Infrastructure'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  displayName: 'Checkout Code'

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download Terraform Plan'
                  inputs:
                    artifact: 'terraform-plan'
                    path: '$(System.DefaultWorkingDirectory)/terraform'

                - task: TerraformInstaller@1
                  displayName: 'Install Terraform'
                  inputs:
                    terraformVersion: $(terraformVersion)

                - task: AzureCLI@2
                  displayName: 'Terraform Init'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
                    addSpnToEnvironment: true
                    inlineScript: |
                      export ARM_CLIENT_ID=$servicePrincipalId
                      export ARM_CLIENT_SECRET=$servicePrincipalKey
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                      export ARM_TENANT_ID=$tenantId

                      terraform init -reconfigure \
                        -backend-config="resource_group_name=$(backendResourceGroupName)" \
                        -backend-config="storage_account_name=$(backendStorageAccountName)" \
                        -backend-config="container_name=$(backendContainerName)" \
                        -backend-config="key=$(backendKey)"

                - task: AzureCLI@2
                  displayName: 'Terraform Apply'
                  name: terraformApply
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
                    addSpnToEnvironment: true
                    inlineScript: |
                      export ARM_CLIENT_ID=$servicePrincipalId
                      export ARM_CLIENT_SECRET=$servicePrincipalKey
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                      export ARM_TENANT_ID=$tenantId

                      terraform apply \
                        -auto-approve \
                        -input=false \
                        tfplan

                      RESOURCE_GROUP=$(terraform output -raw resource_group_name)
                      AKS_CLUSTER=$(terraform output -raw aks_cluster_name)
                      ACR_NAME=$(terraform output -raw acr_name)
                      AKS_ID=$(terraform output -raw aks_cluster_id)

                      echo "##vso[task.setvariable variable=resourceGroupName;isOutput=true]$RESOURCE_GROUP"
                      echo "##vso[task.setvariable variable=aksClusterName;isOutput=true]$AKS_CLUSTER"
                      echo "##vso[task.setvariable variable=acrName;isOutput=true]$ACR_NAME"
                      echo "##vso[task.setvariable variable=aksClusterId;isOutput=true]$AKS_ID"

                - task: AzureCLI@2
                  displayName: 'Attach ACR to AKS'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
                    inlineScript: |
                      RESOURCE_GROUP=$(terraform output -raw resource_group_name)
                      AKS_CLUSTER=$(terraform output -raw aks_cluster_name)
                      ACR_NAME=$(terraform output -raw acr_name)

                      az aks update \
                        --name $AKS_CLUSTER \
                        --resource-group $RESOURCE_GROUP \
                        --attach-acr $ACR_NAME

                - task: AzureCLI@2
                  displayName: 'Allow HTTP Traffic (NSG + LB Probe)'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
                    inlineScript: |
                      RESOURCE_GROUP=$(terraform output -raw resource_group_name)
                      AKS_CLUSTER=$(terraform output -raw aks_cluster_name)
                      MC_RG="MC_${RESOURCE_GROUP}_${AKS_CLUSTER}_eastus"

                      # Add HTTP inbound rule to node pool NSG
                      NODE_NSG=$(az network nsg list \
                        --resource-group $MC_RG \
                        --query '[0].name' -o tsv)

                      az network nsg rule create \
                        --resource-group $MC_RG \
                        --nsg-name $NODE_NSG \
                        --name allow-http \
                        --priority 200 \
                        --protocol Tcp \
                        --destination-port-ranges 80 \
                        --access Allow \
                        --direction Inbound 2>/dev/null || true

                      # Fix LB health probe to TCP
                      LB_PROBE=$(az network lb probe list \
                        --resource-group $MC_RG \
                        --lb-name kubernetes \
                        --query "[?contains(name,'TCP-80')].name" -o tsv 2>/dev/null || echo "")

                      if [ -n "$LB_PROBE" ]; then
                        az network lb probe update \
                          --resource-group $MC_RG \
                          --lb-name kubernetes \
                          --name $LB_PROBE \
                          --protocol Tcp \
                          --path "" 2>/dev/null || true
                      fi

                - task: AzureCLI@2
                  displayName: 'Output Infrastructure Details'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
                    inlineScript: |
                      echo "=========================================="
                      echo "INFRASTRUCTURE DEPLOYMENT COMPLETE"
                      echo "=========================================="
                      echo "Resource Group: $(terraform output -raw resource_group_name)"
                      echo "AKS Cluster:    $(terraform output -raw aks_cluster_name)"
                      echo "ACR Name:       $(terraform output -raw acr_name)"
                      echo "ACR Login Server: $(terraform output -raw acr_login_server)"
                      echo "=========================================="
