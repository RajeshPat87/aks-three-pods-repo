# ============================================================================
# Azure DevOps Pipeline - Secure Application Deployment
# 100% Open Source / Zero License Cost Stack
#
# Stage 1 → Secret Scan     (GitLeaks)         - Free OSS
# Stage 2 → SAST            (Semgrep)           - Free OSS  [replaces SonarCloud]
# Stage 3 → SCA             (pip-audit + OWASP) - Free OSS  [replaces Snyk]
# Stage 4 → Build + Lint    (Hadolint)          - Free OSS
# Stage 5 → Docker + Trivy  (Trivy)             - Free OSS  [replaces Aqua/Snyk]
# Stage 6 → Push to ACR
# Stage 7 → Approval Gate   (ADO Environment)
# Stage 8 → Deploy to AKS   (Helm + Kyverno)   - Free OSS  [replaces OPA Enterprise]
# Stage 9 → Post-Deploy     (Falco + Defender)  - Free OSS  [replaces Aqua Runtime]
# ============================================================================

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - calculator/**
      - weather/**
      - traffic/**
      - helm-charts/**
      - ingress.yaml
      - pipelines/app-deploy-pipeline.yml

pr:
  branches:
    include:
      - main

variables:
  - group: security-secrets
  - name: azureServiceConnection
    value: 'azure-service-connection'
  - name: dockerRegistryServiceConnection
    value: 'acr-service-connection'
  - name: imageTag
    value: '$(Build.BuildId)'
  - name: helmVersion
    value: '3.13.0'
  - name: resourceGroup
    value: 'rg-aks-dev-eus'
  - name: aksCluster
    value: 'aks-dev-eus'
  - name: trivySeverity
    value: 'HIGH,CRITICAL'

stages:
  # =========================================================================
  # STAGE 1: Secret Scan — GitLeaks (Free OSS)
  # Replaces: GitGuardian ($$$)
  # =========================================================================
  - stage: SecretScan
    displayName: 'Stage 1 - Secret Scan (GitLeaks)'
    jobs:
      - job: GitLeaks
        displayName: 'GitLeaks Secret Detection'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            fetchDepth: 0

          - script: |
              curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz \
                | tar -xz -C /usr/local/bin gitleaks
              chmod +x /usr/local/bin/gitleaks
            displayName: 'Install GitLeaks'

          - script: |
              gitleaks detect \
                --source . \
                --report-format sarif \
                --report-path gitleaks-report.sarif \
                --exit-code 1
            displayName: 'Run GitLeaks Scan'

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: 'gitleaks-report.sarif'
              artifactName: 'security-gitleaks'

  # =========================================================================
  # STAGE 2: SAST — Semgrep (Free OSS)
  # Replaces: SonarCloud (paid), Checkmarx ($$$)
  # No token/account needed for OSS rules
  # =========================================================================
  - stage: SAST
    displayName: 'Stage 2 - SAST (Semgrep)'
    dependsOn: SecretScan
    jobs:
      - job: Semgrep
        displayName: 'Semgrep Static Analysis'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - script: |
              pip install semgrep --quiet
            displayName: 'Install Semgrep'

          - script: |
              # Run full security + Python ruleset — no login needed for OSS rules
              semgrep scan \
                --config "p/python" \
                --config "p/security-audit" \
                --config "p/owasp-top-ten" \
                --config "p/secrets" \
                --sarif \
                --output semgrep-results.sarif \
                --error \
                calculator/ weather/ traffic/ || true

              echo "=== Semgrep Summary ==="
              semgrep scan \
                --config "p/python" \
                --config "p/security-audit" \
                --config "p/owasp-top-ten" \
                calculator/ weather/ traffic/
            displayName: 'Run Semgrep SAST'

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: 'semgrep-results.sarif'
              artifactName: 'security-semgrep'

  # =========================================================================
  # STAGE 3: SCA — pip-audit + OWASP Dependency Check (Free OSS)
  # Replaces: Snyk (paid tier), OWASP Dependency Track ($$$)
  # pip-audit: official PyPA tool, checks PyPI advisory database
  # =========================================================================
  - stage: SCA
    displayName: 'Stage 3 - SCA (pip-audit + OWASP)'
    dependsOn: SecretScan
    jobs:
      - job: PipAudit
        displayName: 'pip-audit Dependency Scan'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - script: |
              pip install pip-audit --quiet
            displayName: 'Install pip-audit'

          - script: |
              mkdir -p sca-reports
              SCAN_FAILED=false

              for SERVICE in calculator weather traffic; do
                echo "=== pip-audit: $SERVICE ==="
                pip-audit \
                  --requirement ./$SERVICE/requirements.txt \
                  --format json \
                  --output sca-reports/pip-audit-${SERVICE}.json \
                  --desc || SCAN_FAILED=true

                pip-audit \
                  --requirement ./$SERVICE/requirements.txt \
                  --desc
              done

              if [ "$SCAN_FAILED" = "true" ]; then
                echo "##vso[task.logissue type=error]Vulnerable dependencies found"
                exit 1
              fi
            displayName: 'Run pip-audit'

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: 'sca-reports'
              artifactName: 'security-pip-audit'

      - job: OWASPDependencyCheck
        displayName: 'OWASP Dependency Check'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - script: |
              curl -sSL https://github.com/jeremylong/DependencyCheck/releases/download/v9.0.7/dependency-check-9.0.7-release.zip \
                -o dependency-check.zip
              unzip -q dependency-check.zip
            displayName: 'Install OWASP Dependency Check'

          - script: |
              mkdir -p owasp-reports
              for SERVICE in calculator weather traffic; do
                echo "=== OWASP: $SERVICE ==="
                ./dependency-check/bin/dependency-check.sh \
                  --scan ./$SERVICE \
                  --format HTML --format JSON \
                  --out owasp-reports/$SERVICE \
                  --project $SERVICE \
                  --failOnCVSS 8 || true
              done
            displayName: 'Run OWASP Dependency Check'

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: 'owasp-reports'
              artifactName: 'security-owasp'

  # =========================================================================
  # STAGE 4: Build + Hadolint (Dockerfile Linting)
  # =========================================================================
  - stage: BuildAndLint
    displayName: 'Stage 4 - Build + Hadolint'
    dependsOn:
      - SAST
      - SCA
    jobs:
      - job: HadolintCheck
        displayName: 'Hadolint Dockerfile Lint'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - script: |
              curl -sSL https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 \
                -o /usr/local/bin/hadolint
              chmod +x /usr/local/bin/hadolint
            displayName: 'Install Hadolint'

          - script: |
              LINT_FAILED=false
              for SERVICE in calculator weather traffic; do
                echo "=== Hadolint: $SERVICE/Dockerfile ==="
                hadolint \
                  --format sarif \
                  ./$SERVICE/Dockerfile > hadolint-${SERVICE}.sarif 2>&1 || true
                hadolint \
                  --failure-threshold error \
                  ./$SERVICE/Dockerfile || LINT_FAILED=true
              done

              if [ "$LINT_FAILED" = "true" ]; then
                echo "##vso[task.logissue type=error]Dockerfile errors found — fix before proceeding"
                exit 1
              fi
            displayName: 'Run Hadolint on All Dockerfiles'

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: '$(System.DefaultWorkingDirectory)'
              artifactName: 'security-hadolint'

  # =========================================================================
  # STAGE 5: Docker Build + Trivy Scan (Free OSS)
  # Replaces: Snyk Container ($$$), Aqua ($$$)
  # Build locally → scan → only push if clean
  # =========================================================================
  - stage: DockerBuildAndScan
    displayName: 'Stage 5 - Docker Build + Trivy Scan'
    dependsOn: BuildAndLint
    jobs:
      - job: BuildAndScan
        displayName: 'Build Images and Trivy Scan'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - script: |
              curl -sSL https://github.com/aquasecurity/trivy/releases/download/v0.49.1/trivy_0.49.1_Linux-64bit.tar.gz \
                | tar -xz -C /usr/local/bin trivy
            displayName: 'Install Trivy'

          - task: AzureCLI@2
            displayName: 'Build & Trivy Scan All Images'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                ACR_LOGIN_SERVER=$(az acr list \
                  --resource-group $(resourceGroup) \
                  --query "[0].loginServer" -o tsv)
                echo "##vso[task.setvariable variable=acrLoginServer]$ACR_LOGIN_SERVER"

                SCAN_FAILED=false
                for SERVICE in calculator weather traffic; do
                  IMAGE="${ACR_LOGIN_SERVER}/${SERVICE}:$(imageTag)"
                  echo "=== Building $IMAGE ==="
                  docker build -t $IMAGE ./$SERVICE

                  echo "=== Trivy image scan: $SERVICE ==="
                  trivy image \
                    --severity $(trivySeverity) \
                    --format sarif \
                    --output trivy-image-${SERVICE}.sarif \
                    --exit-code 1 \
                    $IMAGE || SCAN_FAILED=true

                  echo "=== Trivy config scan: $SERVICE ==="
                  trivy config \
                    --severity $(trivySeverity) \
                    --format sarif \
                    --output trivy-config-${SERVICE}.sarif \
                    ./$SERVICE || true
                done

                if [ "$SCAN_FAILED" = "true" ]; then
                  echo "##vso[task.logissue type=error]$(trivySeverity) vulnerabilities found. Fix before pushing."
                  exit 1
                fi
                echo "All images passed Trivy scan."

          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              pathToPublish: '$(System.DefaultWorkingDirectory)'
              artifactName: 'security-trivy'

  # =========================================================================
  # STAGE 6: Push to ACR (only after all scans pass)
  # =========================================================================
  - stage: PushToACR
    displayName: 'Stage 6 - Push to ACR'
    dependsOn: DockerBuildAndScan
    condition: succeeded()
    jobs:
      - job: PushImages
        displayName: 'Push Verified Images to ACR'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: Docker@2
            displayName: 'Build & Push Calculator'
            inputs:
              command: 'buildAndPush'
              repository: 'calculator'
              dockerfile: 'calculator/Dockerfile'
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: 'Build & Push Weather'
            inputs:
              command: 'buildAndPush'
              repository: 'weather'
              dockerfile: 'weather/Dockerfile'
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(imageTag)
                latest

          - task: Docker@2
            displayName: 'Build & Push Traffic'
            inputs:
              command: 'buildAndPush'
              repository: 'traffic'
              dockerfile: 'traffic/Dockerfile'
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(imageTag)
                latest

  # =========================================================================
  # STAGE 7: Approval Gate (ADO Environment)
  # Approval auto-configured by: scripts/setup-ado-cli.sh
  # =========================================================================
  - stage: ApprovalGate
    displayName: 'Stage 7 - Approval Gate'
    dependsOn: PushToACR
    condition: succeeded()
    jobs:
      - deployment: WaitForApproval
        displayName: 'Awaiting Manual Approval'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'AKS-Applications'
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "====== APPROVAL GRANTED ======"
                    echo "Image Tag : $(imageTag)"
                    echo "Cluster   : $(aksCluster)"
                    echo "Scans done: GitLeaks, Semgrep, pip-audit, Hadolint, Trivy"
                    echo "=============================="
                  displayName: 'Approval Confirmed'

  # =========================================================================
  # STAGE 8: Deploy to AKS + Kyverno Policy Enforcement (Free OSS)
  # Replaces: OPA Enterprise ($$$)
  # Kyverno: Kubernetes-native policy engine, YAML-first, no Rego needed
  # =========================================================================
  - stage: DeployToAKS
    displayName: 'Stage 8 - Deploy to AKS (+ Kyverno)'
    dependsOn: ApprovalGate
    condition: succeeded()
    jobs:
      - deployment: DeployApps
        displayName: 'Helm Deploy + Policy Enforcement'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'AKS-Production'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: HelmInstaller@1
                  inputs:
                    helmVersionToInstall: $(helmVersion)

                - task: AzureCLI@2
                  displayName: 'Get Cluster Credentials'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      ACR_LOGIN_SERVER=$(az acr list \
                        --resource-group $(resourceGroup) \
                        --query "[0].loginServer" -o tsv)
                      echo "##vso[task.setvariable variable=acrLoginServer]$ACR_LOGIN_SERVER"

                      az aks get-credentials \
                        --resource-group $(resourceGroup) \
                        --name $(aksCluster) \
                        --overwrite-existing --admin
                      kubectl cluster-info || { echo "Cluster unreachable"; exit 1; }

                - task: AzureCLI@2
                  displayName: 'Install Kyverno Policy Engine'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      # Install Kyverno (replaces OPA/Gatekeeper)
                      helm repo add kyverno https://kyverno.github.io/kyverno
                      helm repo update
                      helm upgrade --install kyverno kyverno/kyverno \
                        --namespace kyverno \
                        --create-namespace \
                        --wait --timeout 5m 2>/dev/null || true

                      # Apply security policies
                      kubectl apply -f - <<'EOF'
                      apiVersion: kyverno.io/v1
                      kind: ClusterPolicy
                      metadata:
                        name: disallow-root-containers
                      spec:
                        validationFailureAction: enforce
                        rules:
                          - name: check-runasnonroot
                            match:
                              resources:
                                kinds: [Pod]
                            validate:
                              message: "Containers must not run as root"
                              pattern:
                                spec:
                                  containers:
                                    - securityContext:
                                        runAsNonRoot: true
                      ---
                      apiVersion: kyverno.io/v1
                      kind: ClusterPolicy
                      metadata:
                        name: require-resource-limits
                      spec:
                        validationFailureAction: audit
                        rules:
                          - name: check-resource-limits
                            match:
                              resources:
                                kinds: [Pod]
                            validate:
                              message: "Resource limits are required"
                              pattern:
                                spec:
                                  containers:
                                    - resources:
                                        limits:
                                          memory: "?*"
                                          cpu: "?*"
                      ---
                      apiVersion: kyverno.io/v1
                      kind: ClusterPolicy
                      metadata:
                        name: disallow-privilege-escalation
                      spec:
                        validationFailureAction: enforce
                        rules:
                          - name: no-privilege-escalation
                            match:
                              resources:
                                kinds: [Pod]
                            validate:
                              message: "Privilege escalation is not allowed"
                              pattern:
                                spec:
                                  containers:
                                    - securityContext:
                                        allowPrivilegeEscalation: false
                      EOF
                      echo "Kyverno policies applied."

                - task: AzureCLI@2
                  displayName: 'Apply Pod Security + Network Policies'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      # Pod Security Standards
                      kubectl label namespace default \
                        pod-security.kubernetes.io/enforce=baseline \
                        pod-security.kubernetes.io/warn=restricted \
                        pod-security.kubernetes.io/audit=restricted \
                        --overwrite

                      # Resource Quota
                      kubectl apply -f - <<EOF
                      apiVersion: v1
                      kind: ResourceQuota
                      metadata:
                        name: app-resource-quota
                        namespace: default
                      spec:
                        hard:
                          pods: "20"
                          requests.cpu: "4"
                          requests.memory: "4Gi"
                          limits.cpu: "8"
                          limits.memory: "8Gi"
                      EOF

                      # Network Policies
                      kubectl apply -f - <<EOF
                      apiVersion: networking.k8s.io/v1
                      kind: NetworkPolicy
                      metadata:
                        name: default-deny-ingress
                        namespace: default
                      spec:
                        podSelector: {}
                        policyTypes: [Ingress]
                      ---
                      apiVersion: networking.k8s.io/v1
                      kind: NetworkPolicy
                      metadata:
                        name: allow-ingress-nginx
                        namespace: default
                      spec:
                        podSelector: {}
                        policyTypes: [Ingress]
                        ingress:
                          - from:
                            - namespaceSelector:
                                matchLabels:
                                  kubernetes.io/metadata.name: ingress-nginx
                      EOF
                      echo "Pod security and network policies applied."

                - task: AzureCLI@2
                  displayName: 'Install NGINX + Deploy Applications'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
                      helm repo update
                      helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
                        --namespace ingress-nginx --create-namespace \
                        --wait --timeout 5m 2>/dev/null || true

                      for SERVICE in calculator weather traffic; do
                        helm upgrade --install $SERVICE ./helm-charts/${SERVICE}-chart \
                          --set image.repository=$(acrLoginServer)/$SERVICE \
                          --set image.tag=$(imageTag) \
                          --wait --atomic --cleanup-on-fail --timeout 10m
                      done

                      kubectl apply -f ingress.yaml
                      sleep 30
                      kubectl get ingress

                - task: AzureCLI@2
                  displayName: 'Deployment Summary'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      echo "====== DEPLOYMENT COMPLETE ======"
                      kubectl get pods -o wide
                      kubectl get ingress
                      INGRESS_IP=$(kubectl get ingress calculator-ingress \
                        -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "Pending")
                      echo "Calculator: http://$INGRESS_IP/calculator/add"
                      echo "Weather:    http://$INGRESS_IP/weather/london"
                      echo "Traffic:    http://$INGRESS_IP/traffic"

  # =========================================================================
  # STAGE 9: Post-Deploy — Falco + Microsoft Defender (Free OSS + Free Tier)
  # Replaces: Aqua Runtime ($$$), Prisma Cloud ($$$)
  # Falco: CNCF runtime security, eBPF-based, free OSS
  # Defender: free with AKS (Defender for Cloud free tier)
  # =========================================================================
  - stage: PostDeploySecurity
    displayName: 'Stage 9 - Post-Deploy (Falco + Defender)'
    dependsOn: DeployToAKS
    condition: succeeded()
    jobs:
      - job: FalcoInstall
        displayName: 'Install Falco Runtime Security'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: AzureCLI@2
            displayName: 'Install Falco on AKS'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az aks get-credentials \
                  --resource-group $(resourceGroup) \
                  --name $(aksCluster) \
                  --overwrite-existing --admin

                helm repo add falcosecurity https://falcosecurity.github.io/charts
                helm repo update

                helm upgrade --install falco falcosecurity/falco \
                  --namespace falco \
                  --create-namespace \
                  --set driver.kind=ebpf \
                  --set falcosidekick.enabled=true \
                  --set falcosidekick.webui.enabled=true \
                  --wait --timeout 5m || true

                echo "Falco status:"
                kubectl get pods -n falco

      - job: DefenderEnable
        displayName: 'Enable Microsoft Defender (Free Tier)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: AzureCLI@2
            displayName: 'Enable Defender for Containers'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                az security pricing create \
                  --name Containers \
                  --tier Standard \
                  --subscription $SUBSCRIPTION_ID

                az aks update \
                  --resource-group $(resourceGroup) \
                  --name $(aksCluster) \
                  --enable-defender

                echo "Defender for Containers: ENABLED"

      - job: SecuritySummary
        displayName: 'Final Security Summary'
        dependsOn: [FalcoInstall, DefenderEnable]
        condition: always()
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              echo "============================================"
              echo "   DEVSECOPS PIPELINE COMPLETE"
              echo "   100% Open Source — Zero License Cost"
              echo "============================================"
              echo " Stage 1: GitLeaks       — Secrets scanned"
              echo " Stage 2: Semgrep        — SAST complete"
              echo " Stage 3: pip-audit+OWASP— SCA complete"
              echo " Stage 4: Hadolint       — Dockerfiles linted"
              echo " Stage 5: Trivy          — Images scanned"
              echo " Stage 6: ACR            — Clean images pushed"
              echo " Stage 7: Approval Gate  — Manually approved"
              echo " Stage 8: Kyverno        — Policies enforced"
              echo " Stage 9: Falco+Defender — Runtime security ON"
              echo "============================================"
              echo " Cost: FREE (vs ₹40L/year paid stack)"
              echo "============================================"
            displayName: 'Pipeline Security Summary'
